name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

  setup-java:
    runs-on: ubuntu-latest
    needs: [checkout]
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

  chmod-mvnw:
    runs-on: ubuntu-latest
    needs: [setup-java]
    steps:
      - uses: actions/checkout@v5
      - run: chmod +x ./mvnw

  install-psql-client:
    runs-on: ubuntu-latest
    needs: [chmod-mvnw]
    steps:
      - uses: actions/checkout@v5
      - name: Install Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

  redis-ready:
    runs-on: ubuntu-latest
    needs: [install-psql-client]
    services:
      redis:
        image: redis:latest
        ports: [ "6379:6379" ]
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Wait for Redis (defensive)
        run: |
          for i in {1..30}; do
            if echo PING | nc -w 1 localhost 6379 | grep -q PONG; then
              echo "Redis is up"
              exit 0
            fi
            echo "Waiting for Redis..."
            sleep 1
          done
          echo "Redis did not become healthy in time"
          exit 1

  postgres-init:
    runs-on: ubuntu-latest
    needs: [redis-ready]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: session_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U postgres -d session_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Install Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Create Spring Session tables
        env:
          PGPASSWORD: password
        run: |
          until pg_isready -h localhost -p 5432 -U postgres -d session_db; do
            echo "Waiting for Postgres..."
            sleep 2
          done
          psql "host=localhost port=5432 user=postgres dbname=session_db" <<'SQL'
          DROP TABLE IF EXISTS SPRING_SESSION_ATTRIBUTES;
          DROP TABLE IF EXISTS SPRING_SESSION;

          CREATE TABLE IF NOT EXISTS SPRING_SESSION
          (
              PRIMARY_ID            CHAR(36) NOT NULL,
              SESSION_ID            CHAR(36) NOT NULL,
              CREATION_TIME         BIGINT   NOT NULL,
              LAST_ACCESS_TIME      BIGINT   NOT NULL,
              MAX_INACTIVE_INTERVAL INT      NOT NULL,
              EXPIRY_TIME           BIGINT   NOT NULL,
              PRINCIPAL_NAME        VARCHAR(100),
              CONSTRAINT SPRING_SESSION_PK PRIMARY KEY (PRIMARY_ID)
          );

          CREATE UNIQUE INDEX IF NOT EXISTS SPRING_SESSION_IX1 ON SPRING_SESSION (SESSION_ID);
          CREATE INDEX IF NOT EXISTS SPRING_SESSION_IX2 ON SPRING_SESSION (EXPIRY_TIME);
          CREATE INDEX IF NOT EXISTS SPRING_SESSION_IX3 ON SPRING_SESSION (PRINCIPAL_NAME);

          CREATE TABLE IF NOT EXISTS SPRING_SESSION_ATTRIBUTES (
            SESSION_PRIMARY_ID CHAR(36) NOT NULL,
            ATTRIBUTE_NAME VARCHAR(200) NOT NULL,
            ATTRIBUTE_BYTES BYTEA NOT NULL,
            CONSTRAINT SPRING_SESSION_ATTRIBUTES_PK PRIMARY KEY (SESSION_PRIMARY_ID, ATTRIBUTE_NAME),
            CONSTRAINT SPRING_SESSION_ATTRIBUTES_FK FOREIGN KEY (SESSION_PRIMARY_ID)
              REFERENCES SPRING_SESSION(PRIMARY_ID) ON DELETE CASCADE
          );
          SQL
      - name: Show Postgres logs (verification)
        run: docker logs ${{ job.services.postgres.id }} --since=10m || true

  build:
    runs-on: ubuntu-latest
    needs: [postgres-init]
    services:
      redis:
        image: redis:latest
        ports: [ "6379:6379" ]
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: session_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U postgres -d session_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - run: chmod +x ./mvnw
      - name: Wait for services
        run: |
          for i in {1..30}; do
            if echo PING | nc -w 1 localhost 6379 | grep -q PONG; then break; fi
            echo "Waiting for Redis..."; sleep 1
          done
          until pg_isready -h localhost -p 5432 -U postgres -d session_db; do
            echo "Waiting for Postgres..."; sleep 2
          done
      - name: Build with Maven (test profile)
        run: ./mvnw clean package -Dspring.profiles.active=test
